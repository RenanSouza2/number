name: C CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-26.04
    steps:
    - uses: actions/checkout@v4
    - run: git submodule update --init --recursive
    - run: make test -s

  build:
    runs-on: ubuntu-26.04
    steps:
    - uses: actions/checkout@v4
    - run: git submodule update --init --recursive
    - run: make build -s
